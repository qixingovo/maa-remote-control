<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MAA遥控</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
    #setup { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 24px; gap: 16px; }
    #setup h2 { font-size: 20px; color: #1a1a2e; }
    #setup input { width: 100%; padding: 14px; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 16px; text-align: center; }
    #setup button { width: 100%; padding: 14px; background: #1a73e8; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
    #setup p { font-size: 12px; color: #888; text-align: center; }
    iframe { flex: 1; border: none; width: 100%; height: 100%; display: none; }
  </style>
</head>
<body>
  <div id="setup">
    <h2>MAA 遥控器</h2>
    <p>输入你的 MAA 远程控制服务器地址</p>
    <input type="url" id="url-input" placeholder="https://maa-remote-control.qixingovo.cn" value="">
    <button id="connect-btn">连接</button>
    <p style="margin-top:8px">默认使用公共服务器</p>
  </div>
  <iframe id="webview" sandbox="allow-same-origin allow-scripts allow-forms allow-popups"></iframe>
  <script>
    const DEFAULT_URL = 'https://maa-remote-control.qixingovo.cn';
    const setupEl = document.getElementById('setup');
    const iframe = document.getElementById('webview');
    const input = document.getElementById('url-input');
    const btn = document.getElementById('connect-btn');

    // Load saved URL or show setup
    const saved = localStorage.getItem('maa_server_url');
    if (saved) { connect(saved); }
    else { input.value = DEFAULT_URL; }

    function connect(url) {
      if (!url) url = input.value.trim() || DEFAULT_URL;
      if (!url.startsWith('http')) url = 'https://' + url;
      localStorage.setItem('maa_server_url', url);
      setupEl.style.display = 'none';
      iframe.style.display = 'block';
      iframe.src = url;
    }

    btn.addEventListener('click', () => connect());
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') connect(); });

    // Handle back button to close app
    document.addEventListener('backbutton', () => {
      if (iframe.style.display === 'block') {
        setupEl.style.display = 'flex';
        iframe.style.display = 'none';
      }
    }, false);
  </script>
</body>
</html>
