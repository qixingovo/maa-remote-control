name: Build Android APK

on:
  push:
    paths:
      - 'android-app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" 2>&1 | tail -3 || true
          echo "sdk.dir=$ANDROID_HOME" > android-app/android/local.properties

      - name: Install Dependencies
        working-directory: android-app
        run: npm ci

      - name: Sync Capacitor
        working-directory: android-app
        run: npx cap sync android

      - name: Build APK
        working-directory: android-app/android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: android-app/android/app/build/outputs/apk/debug/app-debug.apk
          name: MAA遥控 - 最新构建
          tag: nightly
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          body: '自动构建版本。安装后输入 MAA 远程控制服务器地址即可。'
