<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAA Remote Control</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="topbar">
    <h1>MAA Remote Control</h1>
    <span id="auth-status"></span>
  </header>

  <div class="layout">
    <nav class="sidebar">
      <a href="#dashboard" class="nav-item active" data-tab="dashboard">仪表盘</a>
      <a href="#devices" class="nav-item" data-tab="devices">设备管理</a>
      <a href="#tasks" class="nav-item" data-tab="tasks">任务队列</a>
      <a href="#screenshots" class="nav-item" data-tab="screenshots">截图画廊</a>
    </nav>

    <main class="content">
      <!-- Dashboard -->
      <section id="dashboard" class="tab active">
        <div class="stats-grid" id="stats-cards"></div>
        <div class="panel">
          <h2>快速下发</h2>
          <div class="quick-dispatch">
            <select id="qd-device"></select>
            <select id="qd-type">
              <optgroup label="一键长草">
                <option value="LinkStart">LinkStart (全部)</option>
                <option value="LinkStart-Base">切换&导航到基建</option>
                <option value="LinkStart-WakeUp">开始唤醒</option>
                <option value="LinkStart-Combat">刷理智</option>
                <option value="LinkStart-Recruiting">自动公招</option>
                <option value="LinkStart-Mall">信用及购物</option>
                <option value="LinkStart-Mission">每日&每周任务</option>
                <option value="LinkStart-AutoRoguelike">自动集成战略</option>
                <option value="LinkStart-Reclamation">生息演算</option>
              </optgroup>
              <optgroup label="截图">
                <option value="CaptureImage">截图 (排队)</option>
                <option value="CaptureImageNow">截图 (立即)</option>
              </optgroup>
              <optgroup label="工具箱">
                <option value="Toolbox-GachaOnce">牛牛抽卡x1</option>
                <option value="Toolbox-GachaTenTimes">牛牛抽卡x10</option>
              </optgroup>
              <optgroup label="控制">
                <option value="StopTask">停止当前任务</option>
                <option value="HeartBeat">心跳检测</option>
              </optgroup>
            </select>
            <button id="qd-send">发送</button>
          </div>
        </div>
        <div class="panel">
          <h2>最近活动</h2>
          <div class="card-list" id="recent-activity-cards"></div>
          <table id="recent-activity">
            <thead><tr><th>时间</th><th>设备</th><th>任务</th><th>状态</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <!-- Devices -->
      <section id="devices" class="tab">
        <div class="panel">
          <div class="panel-header">
            <h2>设备列表</h2>
            <button id="dev-add-btn">手动添加设备</button>
          </div>
          <div class="card-list" id="devices-cards"><div style="text-align:center;color:var(--text-secondary);padding:20px">暂无设备</div></div>
          <table id="devices-table">
            <thead><tr><th>状态</th><th>名称</th><th>设备 UUID</th><th>用户标识符</th><th>模拟器</th><th>最后在线</th><th>待执行</th><th>操作</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <!-- Tasks -->
      <section id="tasks" class="tab">
        <div class="panel">
          <div class="panel-header">
            <h2>创建任务</h2>
            <button id="task-batch-btn">批量下发</button>
          </div>
          <div class="task-create-form">
            <select id="task-device"></select>
            <select id="task-type">
              <optgroup label="一键长草">
                <option value="LinkStart">LinkStart (全部)</option>
                <option value="LinkStart-Base">基建</option>
                <option value="LinkStart-WakeUp">唤醒</option>
                <option value="LinkStart-Combat">刷理智</option>
                <option value="LinkStart-Recruiting">自动公招</option>
                <option value="LinkStart-Mall">信用购物</option>
                <option value="LinkStart-Mission">每日每周</option>
                <option value="LinkStart-AutoRoguelike">集成战略</option>
                <option value="LinkStart-Reclamation">生息演算</option>
              </optgroup>
              <optgroup label="截图">
                <option value="CaptureImage">截图(排队)</option>
                <option value="CaptureImageNow">截图(立即)</option>
              </optgroup>
              <optgroup label="工具箱">
                <option value="Toolbox-GachaOnce">牛牛抽卡x1</option>
                <option value="Toolbox-GachaTenTimes">牛牛抽卡x10</option>
              </optgroup>
              <optgroup label="控制">
                <option value="StopTask">停止任务</option>
                <option value="HeartBeat">心跳</option>
              </optgroup>
            </select>
            <input type="text" id="task-params" placeholder="参数 (可选)" style="width:150px">
            <button id="task-enqueue">加入队列</button>
          </div>
        </div>
        <!-- MAA Full Config Panel -->
        <div class="panel">
          <div class="panel-header">
            <h2>远程配置</h2>
            <span style="font-size:12px;color:var(--text-secondary)">配置通过 Settings-* 任务下发，MAA 收到后即时生效</span>
          </div>
          <div class="settings-form">
            <div class="form-group">
              <label>连接地址 (ADB)</label>
              <input type="text" id="cfg-address" placeholder="如 127.0.0.1:16384，留空不修改">
            </div>
            <div class="form-group">
              <label>刷关卡</label>
              <select id="cfg-stage">
                <option value="">不修改</option>
                <optgroup label="主线刷材料">
                  <option value="1-7">1-7 固源岩</option>
                  <option value="4-4">4-4 研磨石</option>
                  <option value="4-6">4-6 扭转醇</option>
                  <option value="4-7">4-7 轻锰矿</option>
                  <option value="5-5">5-5 海胆</option>
                  <option value="6-11">6-11 晶体元件</option>
                  <option value="7-18">7-18 异铁组</option>
                  <option value="8-7">8-7 铁块</option>
                  <option value="9-19">9-19 晶体电路</option>
                  <option value="10-6">10-6 聚合剂</option>
                  <option value="11-14">11-14 溶媒</option>
                  <option value="12-17">12-17 切削液</option>
                </optgroup>
                <optgroup label="物资筹备">
                  <option value="CE-6">CE-6 龙门币</option>
                  <option value="LS-6">LS-6 经验</option>
                  <option value="AP-5">AP-5 红票</option>
                  <option value="SK-5">SK-5 碳</option>
                  <option value="CA-5">CA-5 技能书</option>
                </optgroup>
                <optgroup label="芯片搜索">
                  <option value="PR-A-1">PR-A-1 近卫/特种</option>
                  <option value="PR-A-2">PR-A-2 重装/辅助</option>
                  <option value="PR-B-1">PR-B-1 狙击/术师</option>
                  <option value="PR-B-2">PR-B-2 先锋/医疗</option>
                  <option value="PR-C-1">PR-C-1 特种</option>
                  <option value="PR-C-2">PR-C-2 辅助</option>
                  <option value="PR-D-1">PR-D-1 术师</option>
                  <option value="PR-D-2">PR-D-2 医疗</option>
                </optgroup>
              </select>
            </div>
          </div>
          <div class="form-group" style="margin-top:8px">
            <label>目标设备</label>
            <select id="cfg-device"></select>
          </div>
          <button id="cfg-apply" style="width:100%;margin-top:4px">下发配置</button>
        </div>
        <!-- LinkStart Quick Toggles -->
        <div class="panel">
          <div class="panel-header">
            <h2>一键长草预设</h2>
            <button id="ls-send" class="accent">全部下发</button>
          </div>
          <div class="toggle-grid" id="ls-toggles">
            <label class="toggle-row"><input type="checkbox" class="ls-cb" data-type="LinkStart-Base" checked><span>基建换班</span></label>
            <label class="toggle-row"><input type="checkbox" class="ls-cb" data-type="LinkStart-WakeUp"><span>开始唤醒</span></label>
            <label class="toggle-row"><input type="checkbox" class="ls-cb" data-type="LinkStart-Combat" checked><span>刷理智</span></label>
            <label class="toggle-row"><input type="checkbox" class="ls-cb" data-type="LinkStart-Recruiting" checked><span>自动公招</span></label>
            <label class="toggle-row"><input type="checkbox" class="ls-cb" data-type="LinkStart-Mall" checked><span>信用购物</span></label>
            <label class="toggle-row"><input type="checkbox" class="ls-cb" data-type="LinkStart-Mission" checked><span>每日/周任务</span></label>
            <label class="toggle-row"><input type="checkbox" class="ls-cb" data-type="LinkStart-AutoRoguelike"><span>自动肉鸽</span></label>
            <label class="toggle-row"><input type="checkbox" class="ls-cb" data-type="LinkStart-Reclamation"><span>生息演算</span></label>
          </div>
          <div class="form-group" style="margin-top:10px">
            <select id="ls-device"></select>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header">
            <h2>任务队列</h2>
            <div class="filter-bar">
              <select id="filter-device"><option value="">全部设备</option></select>
              <select id="filter-status">
                <option value="">全部状态</option>
                <option value="pending">等待中</option>
                <option value="dispatched">已下发</option>
                <option value="running">执行中</option>
                <option value="completed">已完成</option>
                <option value="failed">失败</option>
                <option value="cancelled">已取消</option>
              </select>
              <button id="filter-apply">筛选</button>
            </div>
          </div>
          <div class="card-list" id="tasks-cards"></div>
          <table id="tasks-table">
            <thead><tr><th>任务 UUID</th><th>设备</th><th>类型</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <!-- Screenshots -->
      <section id="screenshots" class="tab">
        <div class="panel">
          <div class="panel-header">
            <h2>截图画廊</h2>
            <div class="filter-bar">
              <select id="shot-device-filter"><option value="">全部设备</option></select>
              <button id="shot-delete-selected" style="display:none">删除选中</button>
            </div>
          </div>
          <div class="screenshot-grid" id="screenshot-grid"></div>
        </div>
      </section>
    </main>
  </div>

  <!-- Bottom navigation (mobile) -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="bottom-nav-item active" data-tab="dashboard">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
      仪表盘
    </button>
    <button class="bottom-nav-item" data-tab="devices">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 6h18V4H4c-1.1 0-2 .9-2 2v11H0v3h14v-3H4V6zm19 2h-6c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h6c.55 0 1-.45 1-1V9c0-.55-.45-1-1-1zm-1 9h-4v-7h4v7z"/></svg>
      设备
    </button>
    <button class="bottom-nav-item" data-tab="tasks">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM6 20V4h5v7h7v9H6z"/></svg>
      任务
    </button>
    <button class="bottom-nav-item" data-tab="screenshots">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      截图
    </button>
  </nav>

  <!-- Edit device modal -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal" id="modal-content"></div>
  </div>

  <!-- Login modal -->
  <div class="modal-overlay" id="login-overlay" style="display:none">
    <div class="modal login-modal">
      <h2>登录</h2>
      <input type="password" id="login-password" placeholder="管理员密码">
      <button id="login-submit">登录</button>
      <p id="login-error" style="color:red;display:none">密码错误</p>
    </div>
  </div>

  <script src="/js/api-client.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/devices.js"></script>
  <script src="/js/task-queue.js"></script>
  <script src="/js/screenshots.js"></script>
</body>
</html>
